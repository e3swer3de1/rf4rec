<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Human Verification</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #1a3a2a 0%, #0d1f16 40%, #080f0c 100%);
      padding: 24px;
    }

    .card {
      background: linear-gradient(160deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px 32px 36px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 64px;
      height: 64px;
      background: linear-gradient(145deg, #3ecf6e, #27a855);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(62,207,110,0.35);
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .icon-wrap svg {
      width: 32px;
      height: 32px;
      stroke: white;
      stroke-width: 2.5;
      fill: none;
    }

    .welcome {
      color: rgba(255,255,255,0.45);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      animation: fadeUp 0.5s 0.15s ease both;
    }

    h1 {
      color: #3ecf6e;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      font-weight: 400;
      margin-bottom: 32px;
      animation: fadeUp 0.5s 0.25s ease both;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #3ecf6e, #27a855);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 8px 24px rgba(62,207,110,0.4);
      animation: fadeUp 0.5s 0.3s ease both;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(62,207,110,0.5);
    }

    .btn:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .success {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeUp 0.4s ease both;
    }

    .success svg {
      width: 48px;
      height: 48px;
      stroke: #3ecf6e;
      stroke-width: 2.5;
      fill: none;
    }

    .success p {
      color: rgba(255,255,255,0.6);
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <p class="welcome" id="welcome">Welcome, <span id="username">there</span></p>
    <h1>Human Verification</h1>
    <p class="subtitle">Verify below to be granted entry</p>

    <div id="verify-section">
      <button class="btn" id="verifyBtn" onclick="verify()">Click here to verify</button>
    </div>

    <div class="success" id="success">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      <p>You're verified! You may now close this window.</p>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      const user = tg.initDataUnsafe?.user;
      if (user?.first_name) {
        document.getElementById('username').textContent = user.first_name;
      }
    }

    function verify() {
      const btn = document.getElementById('verifyBtn');
      btn.disabled = true;
      btn.textContent = 'Verifying...';

      setTimeout(() => {
        document.getElementById('verify-section').style.display = 'none';
        const success = document.getElementById('success');
        success.style.display = 'flex';
        if (tg) tg.close();
      }, 1200);
    }
  </script>
</body>
</html>
